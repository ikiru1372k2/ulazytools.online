name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  integration-smoke:
    name: Integration Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ulazytools_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ulazytools_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ulazytools_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ulazytools_ci
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync Prisma schema
        run: npx prisma db push --skip-generate

      - name: Run runtime smoke checks
        run: npm run ci:smoke

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    env:
      AUTH_SECRET: ci-auth-secret
      AUTH_GOOGLE_ID: ci-google-client-id
      AUTH_GOOGLE_SECRET: ci-google-client-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ulazytools_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ulazytools_ci
      REDIS_URL: redis://localhost:6379
      S3_ACCESS_KEY_ID: ci-access-key
      S3_BUCKET: ci-bucket
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: us-east-1
      S3_SECRET_ACCESS_KEY: ci-secret-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run build
        run: npm run build
